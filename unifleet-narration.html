<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>What is UniFleet? — Narrated Video</title>
  <style>
    :root{
      --bg0:#040713;
      --bg1:#0c1d3f;
      --cyan:#4dd7ff;
      --green:#00d08a;
      --text:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.72);
      --stroke:rgba(255,255,255,.18);
      --shadow:0 16px 54px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 20% 12%, rgba(77,215,255,.14), transparent 60%),
        radial-gradient(900px 560px at 88% 32%, rgba(0,208,138,.10), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg0));
    }

    .panel{
      width:min(980px, calc(100% - 40px));
      margin:28px auto;
      padding:22px;
      border-radius:22px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.06));
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }
    h1{ margin:0 0 8px; font-size:clamp(30px,4vw,44px); letter-spacing:.2px; }
    .sub{ color:var(--muted); margin:0 0 18px; font-size:15px; }

    .video-wrap{
      border:1px solid rgba(255,255,255,.16);
      border-radius:14px;
      overflow:hidden;
      background:#08132d;
      margin-bottom:14px;
    }
    video{
      width:100%;
      height:auto;
      display:block;
      aspect-ratio:16/9;
      object-fit:cover;
      background:#08132d;
    }

    .narration-box{
      min-height:138px;
      border:1px solid rgba(255,255,255,.15);
      border-radius:14px;
      padding:16px;
      background:rgba(8,18,41,.55);
      line-height:1.45;
      font-size:18px;
    }
    .cursor{ display:inline-block; width:10px; }

    .metrics{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(4,minmax(130px,1fr));
      gap:10px;
    }
    .card{
      border:1px solid rgba(255,255,255,.14);
      border-radius:12px;
      padding:12px;
      background:rgba(255,255,255,.06);
    }
    .label{ color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.8px; }
    .value{ font-size:24px; font-weight:900; margin-top:4px; }

    .actions{ margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; }
    button,a{
      border:1px solid rgba(77,215,255,.45);
      background:rgba(77,215,255,.16);
      color:var(--text);
      border-radius:11px;
      padding:10px 14px;
      text-decoration:none;
      cursor:pointer;
      font:800 13px/1 system-ui;
    }
    .secondary{ border-color:rgba(0,208,138,.45); background:rgba(0,208,138,.15); }

    @media (max-width:820px){
      .metrics{ grid-template-columns:repeat(2,minmax(130px,1fr)); }
      .narration-box{ font-size:16px; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>What is UniFleet?</h1>
    <p class="sub">Narrated walkthrough with a UniFleet operations video.</p>

    <section class="video-wrap">
      <video id="unifleetVideo" autoplay muted loop playsinline controls></video>
    </section>

    <section class="narration-box" id="narration"></section>

    <section class="metrics">
      <article class="card"><div class="label">Prediction accuracy</div><div class="value">92%+</div></article>
      <article class="card"><div class="label">Reroute response</div><div class="value">Seconds</div></article>
      <article class="card"><div class="label">Weekly simulations</div><div class="value">1,000s</div></article>
      <article class="card"><div class="label">Network uptime</div><div class="value">99%+</div></article>
    </section>

    <div class="actions">
      <button id="btnReplay">🔊 Replay narration</button>
      <button id="btnMute" class="secondary">🔇 Mute</button>
      <button id="btnRegenerate">🎬 Regenerate video</button>
      <a href="index.html">← Back to Network View</a>
    </div>
  </main>

  <script>
    const narrationText = "Hi Every One Welcome. Today’s supply chains face constant disruption — from ocean route volatility to last-mile congestion and unpredictable demand spikes. UniFleet addresses this with an agentic twin planner that analyzes, simulates, and optimizes logistics decisions in real time. Powered by HPE infrastructure — including HPE Private Cloud AI, HPE Data Fabric, and GreenLake — UniFleet unifies data from fleets, warehouses, and enterprise systems into a live operational graph. The platform predicts demand surges with over 92% accuracy, autonomously reroutes disruptions within seconds, and continuously learns from outcomes. The result is a resilient, self-optimizing supply chain capable of running thousands of simulations every week while keeping network uptime above 99%. UniFleet and HPE together bring autonomous intelligence to global supply chain planning.";

    const narrationEl = document.getElementById('narration');
    const btnReplay = document.getElementById('btnReplay');
    const btnMute = document.getElementById('btnMute');
    const btnRegenerate = document.getElementById('btnRegenerate');
    const videoEl = document.getElementById('unifleetVideo');

    let muted = false;
    let typeTimer = null;

    function typeNarration(text, speed = 24){
      clearInterval(typeTimer);
      narrationEl.textContent = '';
      let i = 0;
      typeTimer = setInterval(() => {
        i += 1;
        narrationEl.textContent = text.slice(0, i);
        if (i >= text.length){
          clearInterval(typeTimer);
          const caret = document.createElement('span');
          caret.className = 'cursor';
          caret.textContent = '▌';
          narrationEl.appendChild(caret);
        }
      }, speed);
    }

    function speakNarration(){
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      if (muted) return;
      const utter = new SpeechSynthesisUtterance(narrationText);
      utter.rate = 0.95;
      utter.pitch = 1;
      utter.lang = 'en-US';
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v => /en-US|English/i.test(v.lang));
      if (preferred) utter.voice = preferred;
      window.speechSynthesis.speak(utter);
    }

    function replay(){
      typeNarration(narrationText);
      speakNarration();
      videoEl.play().catch(() => {});
    }

    function createUniFleetVideo({ durationSeconds = 10, fps = 30 } = {}){
      if (!('MediaRecorder' in window)) return;

      const width = 1280;
      const height = 720;
      const frameCount = durationSeconds * fps;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const nodes = [
        { x: 180, y: 150 }, { x: 410, y: 230 }, { x: 620, y: 170 },
        { x: 800, y: 260 }, { x: 1010, y: 180 }, { x: 1110, y: 330 },
        { x: 300, y: 520 }, { x: 560, y: 560 }, { x: 850, y: 500 }
      ];
      const links = [
        [0,1], [1,2], [2,3], [3,4], [4,5], [6,7], [7,8], [1,7], [2,8], [0,6], [3,7]
      ];

      const stream = canvas.captureStream(fps);
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
        ? 'video/webm;codecs=vp9'
        : 'video/webm';
      const recorder = new MediaRecorder(stream, { mimeType });
      const chunks = [];
      recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        videoEl.src = url;
        videoEl.play().catch(() => {});
      };

      recorder.start();

      for (let frame = 0; frame < frameCount; frame += 1){
        const t = frame / fps;

        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, '#0a1e44');
        bg.addColorStop(1, '#070d1e');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        links.forEach((link, idx) => {
          const a = nodes[link[0]];
          const b = nodes[link[1]];
          const pulse = 0.35 + 0.65 * Math.abs(Math.sin(t * 1.4 + idx * 0.45));
          ctx.strokeStyle = `rgba(77, 215, 255, ${0.2 + pulse * 0.55})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();

          const travel = (t * 0.2 + idx * 0.12) % 1;
          const px = a.x + (b.x - a.x) * travel;
          const py = a.y + (b.y - a.y) * travel;
          ctx.fillStyle = 'rgba(0, 208, 138, 0.95)';
          ctx.beginPath();
          ctx.arc(px, py, 4, 0, Math.PI * 2);
          ctx.fill();
        });

        nodes.forEach((node, idx) => {
          const glow = 8 + Math.abs(Math.sin(t * 2 + idx)) * 8;
          ctx.shadowColor = 'rgba(77, 215, 255, 0.9)';
          ctx.shadowBlur = glow;
          ctx.fillStyle = '#4dd7ff';
          ctx.beginPath();
          ctx.arc(node.x, node.y, 8, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.font = '700 42px system-ui';
        ctx.fillText('UniFleet Live Operations', 56, 72);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '500 24px system-ui';
        ctx.fillText('Autonomous routing, forecasting, and disruption recovery', 56, 110);

        const progress = Math.min(1, t / durationSeconds);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(56, height - 68, width - 112, 10);
        ctx.fillStyle = '#00d08a';
        ctx.fillRect(56, height - 68, (width - 112) * progress, 10);

        const timestamp = `T+${String(Math.floor(t)).padStart(2, '0')}s`;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.font = '600 20px system-ui';
        ctx.fillText(timestamp, width - 140, height - 82);

        await new Promise(r => setTimeout(r, 1000 / fps));
      }

      recorder.stop();
    }

    btnReplay.addEventListener('click', replay);
    btnMute.addEventListener('click', () => {
      muted = !muted;
      btnMute.textContent = muted ? '🔈 Unmute' : '🔇 Mute';
      if (muted) window.speechSynthesis?.cancel();
      else speakNarration();
    });
    btnRegenerate.addEventListener('click', () => createUniFleetVideo());

    window.speechSynthesis?.getVoices();
    createUniFleetVideo();
    replay();
  </script>
</body>
</html>
