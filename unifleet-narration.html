<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>What is UniFleet? — Animated Narration</title>
  <style>
    :root{
      --bg0:#040713;
      --bg1:#0c1d3f;
      --cyan:#4dd7ff;
      --green:#00d08a;
      --text:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.72);
      --stroke:rgba(255,255,255,.18);
      --shadow:0 16px 54px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      overflow:hidden;
      background:
        radial-gradient(1100px 700px at 20% 12%, rgba(77,215,255,.14), transparent 60%),
        radial-gradient(900px 560px at 88% 32%, rgba(0,208,138,.10), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg0));
    }
    .scene{ position:fixed; inset:0; overflow:hidden; }
    .aurora,
    .aurora::before,
    .aurora::after{
      position:absolute;
      content:"";
      width:65vw;
      height:65vw;
      border-radius:50%;
      filter:blur(55px);
      opacity:.22;
      animation:drift 17s ease-in-out infinite;
    }
    .aurora{ left:-16vw; top:-18vh; background:rgba(77,215,255,.6); }
    .aurora::before{ left:50vw; top:16vh; background:rgba(0,208,138,.55); animation-delay:-4s; }
    .aurora::after{ left:18vw; top:44vh; background:rgba(99,140,255,.55); animation-delay:-8s; }

    .network{ position:absolute; inset:0; }
    .line{
      position:absolute;
      height:2px;
      transform-origin:left center;
      background:linear-gradient(90deg, rgba(77,215,255,.15), rgba(77,215,255,.95), rgba(0,208,138,.15));
      box-shadow:0 0 12px rgba(77,215,255,.55);
      opacity:.85;
      animation:pulse 2.8s ease-in-out infinite;
    }
    .packet{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--cyan);
      box-shadow:0 0 14px rgba(77,215,255,.95);
      animation:travel 5.2s linear infinite;
    }
    .node{
      position:absolute;
      width:14px;
      height:14px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #bdf5ff, var(--cyan));
      box-shadow:0 0 18px rgba(77,215,255,.9);
      animation:blink 2.2s ease-in-out infinite;
    }

    .panel{
      position:relative;
      z-index:3;
      width:min(980px, calc(100% - 40px));
      margin:28px auto;
      padding:22px;
      border-radius:22px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.06));
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }
    h1{ margin:0 0 8px; font-size:clamp(30px,4vw,44px); letter-spacing:.2px; }
    .sub{ color:var(--muted); margin:0 0 18px; font-size:15px; }
    .narration-box{
      min-height:138px;
      border:1px solid rgba(255,255,255,.15);
      border-radius:14px;
      padding:10px;
      background:rgba(8,18,41,.55);
      line-height:1.45;
      font-size:18px;
      overflow:hidden;
    }
    .narration-video{
      display:block;
      width:100%;
      height:100%;
      min-height:300px;
      border-radius:10px;
      object-fit:cover;
    }
    .metrics{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(4,minmax(130px,1fr));
      gap:10px;
    }
    .card{
      border:1px solid rgba(255,255,255,.14);
      border-radius:12px;
      padding:12px;
      background:rgba(255,255,255,.06);
      transform:translateY(14px);
      opacity:0;
      animation:floatIn .7s ease forwards;
    }
    .card:nth-child(2){ animation-delay:.25s; }
    .card:nth-child(3){ animation-delay:.5s; }
    .card:nth-child(4){ animation-delay:.75s; }
    .label{ color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.8px; }
    .value{ font-size:24px; font-weight:900; margin-top:4px; }
    .actions{ margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; }
    button,a{
      border:1px solid rgba(77,215,255,.45);
      background:rgba(77,215,255,.16);
      color:var(--text);
      border-radius:11px;
      padding:10px 14px;
      text-decoration:none;
      cursor:pointer;
      font:800 13px/1 system-ui;
    }
    .secondary{ border-color:rgba(0,208,138,.45); background:rgba(0,208,138,.15); }

    @keyframes drift{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(5vw, -3vh) scale(1.1);} }
    @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
    @keyframes blink{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.24);} }
    @keyframes travel{ from{ transform:translateX(0);} to{ transform:translateX(100%);} }
    @keyframes floatIn{ to{ opacity:1; transform:translateY(0);} }

    @media (max-width:820px){
      .metrics{ grid-template-columns:repeat(2,minmax(130px,1fr)); }
      .narration-box{ font-size:16px; }
      .narration-video{ min-height:220px; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="aurora"></div>
    <div class="network" id="network"></div>

    <main class="panel">
      <h1>What is UniFleet?</h1>
      <p class="sub">An animated story of autonomous supply chain planning powered by HPE.</p>
      <section class="narration-box">
        <video id="narrationVideo" class="narration-video" playsinline preload="metadata" muted>
          <source src="Global Airlines.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </section>

      <section class="metrics">
        <article class="card"><div class="label">Prediction accuracy</div><div class="value">92%+</div></article>
        <article class="card"><div class="label">Reroute response</div><div class="value">Seconds</div></article>
        <article class="card"><div class="label">Weekly simulations</div><div class="value">1,000s</div></article>
        <article class="card"><div class="label">Network uptime</div><div class="value">99%+</div></article>
      </section>

      <div class="actions">
        <button id="btnReplay">🔊 Replay narration</button>
        <button id="btnMute" class="secondary">🔇 Mute</button>
        <a href="index.html">← Back to Network View</a>
      </div>
    </main>
  </div>

  <script>
    const narrationText = "Today’s supply chains face constant disruption — from ocean route volatility to last-mile congestion and unpredictable demand spikes. UniFleet addresses this with an agentic twin planner that analyzes, simulates, and optimizes logistics decisions in real time. Powered by HPE infrastructure — including HPE Private Cloud AI, HPE Data Fabric, and GreenLake — UniFleet unifies data from fleets, warehouses, and enterprise systems into a live operational graph. The platform predicts demand surges with over 92% accuracy, autonomously reroutes disruptions within seconds, and continuously learns from outcomes. The result is a resilient, self-optimizing supply chain capable of running thousands of simulations every week while keeping network uptime above 99%. UniFleet and HPE together bring autonomous intelligence to global supply chain planning.";
    const narrationSpeechText = narrationText.replace(/\bHPE\b/g, 'H P E');

    const narrationVideo = document.getElementById('narrationVideo');
    const btnReplay = document.getElementById('btnReplay');
    const btnMute = document.getElementById('btnMute');

    let muted = false;
    function playNarrationVideo(){
      if (!narrationVideo) return;
      narrationVideo.currentTime = 0;
      const playPromise = narrationVideo.play();
      if (playPromise?.catch) {
        playPromise.catch(() => {});
      }
    }

    function speakNarration(){
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      if (muted) return;
      const utter = new SpeechSynthesisUtterance(narrationSpeechText);
      utter.rate = 0.95;
      utter.pitch = 1;
      utter.lang = 'en-US';
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v => /en-US|English/i.test(v.lang));
      if (preferred) utter.voice = preferred;
      window.speechSynthesis.speak(utter);
    }

    function replay(){
      playNarrationVideo();
      speakNarration();
    }

    btnReplay.addEventListener('click', replay);
    btnMute.addEventListener('click', () => {
      muted = !muted;
      btnMute.textContent = muted ? '🔈 Unmute' : '🔇 Mute';
      if (muted) window.speechSynthesis?.cancel();
      else speakNarration();
    });

    function addNetworkVisuals(){
      const net = document.getElementById('network');
      const nodes = [
        [15,18],[31,32],[43,20],[58,40],[72,23],[84,42],[24,62],[46,66],[68,58]
      ];
      nodes.forEach(([x,y],idx)=>{
        const d = document.createElement('div');
        d.className = 'node';
        d.style.left = `${x}%`;
        d.style.top = `${y}%`;
        d.style.animationDelay = `${idx*.2}s`;
        net.appendChild(d);
      });

      const links = [
        [[15,18],[31,32]],[[31,32],[43,20]],[[43,20],[58,40]],[[58,40],[72,23]],
        [[72,23],[84,42]],[[24,62],[46,66]],[[46,66],[68,58]],[[31,32],[46,66]],[[43,20],[68,58]]
      ];

      links.forEach(([[x1,y1],[x2,y2]], i)=>{
        const line = document.createElement('div');
        line.className = 'line';
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.hypot(dx,dy);
        const angle = Math.atan2(dy,dx) * 180/Math.PI;
        line.style.width = `${len}%`;
        line.style.left = `${x1}%`;
        line.style.top = `${y1}%`;
        line.style.transform = `rotate(${angle}deg)`;
        line.style.animationDelay = `${i * .25}s`;

        const packet = document.createElement('div');
        packet.className = 'packet';
        packet.style.left = '0';
        packet.style.top = '-4px';
        packet.style.animationDelay = `${i * .35}s`;
        line.appendChild(packet);

        net.appendChild(line);
      });
    }

    addNetworkVisuals();
    setTimeout(replay, 450);
  </script>
</body>
</html>
