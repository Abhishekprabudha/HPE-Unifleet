<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>What is UniFleet? — Animated Narration</title>
  <style>
    :root{
      --bg0:#040713;
      --bg1:#0c1d3f;
      --cyan:#4dd7ff;
      --green:#00d08a;
      --text:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.72);
      --stroke:rgba(255,255,255,.18);
      --shadow:0 16px 54px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      overflow:auto;
      background:
        radial-gradient(1100px 700px at 20% 12%, rgba(77,215,255,.14), transparent 60%),
        radial-gradient(900px 560px at 88% 32%, rgba(0,208,138,.10), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg0));
    }
    .scene{ position:fixed; inset:0; overflow:hidden; }
    .aurora,
    .aurora::before,
    .aurora::after{
      position:absolute;
      content:"";
      width:65vw;
      height:65vw;
      border-radius:50%;
      filter:blur(55px);
      opacity:.22;
      animation:drift 17s ease-in-out infinite;
    }
    .aurora{ left:-16vw; top:-18vh; background:rgba(77,215,255,.6); }
    .aurora::before{ left:50vw; top:16vh; background:rgba(0,208,138,.55); animation-delay:-4s; }
    .aurora::after{ left:18vw; top:44vh; background:rgba(99,140,255,.55); animation-delay:-8s; }

    .network{ position:absolute; inset:0; }
    .line{
      position:absolute;
      height:2px;
      transform-origin:left center;
      background:linear-gradient(90deg, rgba(77,215,255,.15), rgba(77,215,255,.95), rgba(0,208,138,.15));
      box-shadow:0 0 12px rgba(77,215,255,.55);
      opacity:.85;
      animation:pulse 2.8s ease-in-out infinite;
    }
    .packet{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--cyan);
      box-shadow:0 0 14px rgba(77,215,255,.95);
      animation:travel 5.2s linear infinite;
    }
    .node{
      position:absolute;
      width:14px;
      height:14px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #bdf5ff, var(--cyan));
      box-shadow:0 0 18px rgba(77,215,255,.9);
      animation:blink 2.2s ease-in-out infinite;
    }

    .panel{
      position:relative;
      z-index:3;
      width:min(980px, calc(100% - 40px));
      margin:28px auto;
      padding:22px;
      border-radius:22px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.06));
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      max-height:calc(100vh - 56px);
      display:flex;
      flex-direction:column;
      overflow:auto;
    }
    h1{ margin:0 0 8px; font-size:clamp(30px,4vw,44px); letter-spacing:.2px; }
    .sub{ color:var(--muted); margin:0 0 18px; font-size:15px; }
    .narration-box{
      min-height:138px;
      border:1px solid rgba(255,255,255,.15);
      border-radius:14px;
      padding:16px;
      background:rgba(8,18,41,.55);
      line-height:1.45;
      font-size:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:auto;
    }
    .narration-layout{
      width:100%;
      display:grid;
      grid-template-columns:minmax(320px, 46%) minmax(0,1fr);
      align-items:center;
      gap:16px;
    }
    .narration-content{
      font-size:16px;
      color:var(--text);
      line-height:1.5;
      text-align:left;
      max-height:var(--narration-max-height, 360px);
      overflow:auto;
      padding-right:6px;
    }
    .narration-video{
      width:100%;
      max-width:100%;
      max-height:var(--narration-max-height, 360px);
      object-fit:contain;
      border-radius:10px;
      background:#000;
      justify-self:start;
    }
    .cursor{ display:inline-block; width:10px; animation:blinkCaret .8s steps(1) infinite; }
    .metrics{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(4,minmax(130px,1fr));
      gap:10px;
    }
    .card{
      border:1px solid rgba(255,255,255,.14);
      border-radius:12px;
      padding:12px;
      background:rgba(255,255,255,.06);
      transform:translateY(14px);
      opacity:0;
      animation:floatIn .7s ease forwards;
    }
    .card:nth-child(2){ animation-delay:.25s; }
    .card:nth-child(3){ animation-delay:.5s; }
    .card:nth-child(4){ animation-delay:.75s; }
    .label{ color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.8px; }
    .value{ font-size:24px; font-weight:900; margin-top:4px; }
    .actions{ margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; position:sticky; bottom:0; padding-top:10px; background:linear-gradient(180deg, rgba(12,29,63,0), rgba(12,29,63,.9) 40%); }
    button,a{
      border:1px solid rgba(77,215,255,.45);
      background:rgba(77,215,255,.16);
      color:var(--text);
      border-radius:11px;
      padding:10px 14px;
      text-decoration:none;
      cursor:pointer;
      font:800 13px/1 system-ui;
    }
    .secondary{ border-color:rgba(0,208,138,.45); background:rgba(0,208,138,.15); }

    @keyframes drift{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(5vw, -3vh) scale(1.1);} }
    @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
    @keyframes blink{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.24);} }
    @keyframes travel{ from{ transform:translateX(0);} to{ transform:translateX(100%);} }
    @keyframes blinkCaret{ 50%{ opacity:0; } }
    @keyframes floatIn{ to{ opacity:1; transform:translateY(0);} }

    @media (max-width:820px){
      .metrics{ grid-template-columns:repeat(2,minmax(130px,1fr)); }
      .narration-box{ font-size:16px; }
      .narration-layout{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="aurora"></div>
    <div class="network" id="network"></div>

    <main class="panel">
      <h1>What is UniFleet?</h1>
      <p class="sub">An AI Agent autonomously plans and executes supply chain powered by HPE.</p>
      <section class="narration-box" id="narration"></section>

      <section class="metrics">
        <article class="card"><div class="label">Prediction accuracy</div><div class="value">92%+</div></article>
        <article class="card"><div class="label">Reroute response</div><div class="value">Seconds</div></article>
        <article class="card"><div class="label">Weekly simulations</div><div class="value">1,000s</div></article>
        <article class="card"><div class="label">Network uptime</div><div class="value">99%+</div></article>
      </section>

      <div class="actions">
        <button id="btnReplay">🔊 Replay narration</button>
        <button id="btnMute" class="secondary">🔇 Mute</button>
        <a id="btnDataFlow" href="unifleet-narration.html?view=DataFlow">DataFlow</a>
        <a id="btnFunctional" href="unifleet-narration.html?view=Functional">Functional</a>
        <a id="btnFrameWorks" href="unifleet-narration.html?view=FrameWorks">FrameWorks</a>
        <a id="btnHardware" href="unifleet-narration.html?view=Hardware">Hardware</a>
        <a id="btnBackToNetwork" href="index.html">← Back to Network View</a>
      </div>
    </main>
  </div>

  <script>
    const viewConfig = {
      default: {
        narrationText: "Today’s supply chains face constant disruption — from ocean route volatility to last-mile congestion and unpredictable demand spikes. UniFleet addresses this with an agentic twin planner that analyzes, simulates, and optimizes logistics decisions in real time. Powered by HPE infrastructure — including HPE Private Cloud AI, HPE Data Fabric, and GreenLake — UniFleet unifies data from fleets, warehouses, and enterprise systems into a live operational graph. The platform predicts demand surges with over 92% accuracy, autonomously reroutes disruptions within seconds, and continuously learns from outcomes. The result is a resilient, self-optimizing supply chain capable of running thousands of simulations every week while keeping network uptime above 99%. UniFleet and HPE together bring autonomous intelligence to global supply chain planning.",
        mediaType: 'video',
        mediaSource: 'Global Airlines.mp4',
        mediaLabel: 'Global Airlines narration video'
      },
      DataFlow: {
        narrationText: "UniFleet’s dataflow architecture is built in partnership with HPE to create a resilient, AI-driven supply chain platform. Data from ERP and TMS systems, telematics devices, and operational feeds enters through the HPE GreenLake front door, where it streams through secure APIs and service pipelines. Within HPE Private Cloud AI, NVIDIA-accelerated compute powers real-time inference, fine-tuning, and RAG-based intelligence. Event hubs and streaming services process fleet telemetry and logistics signals, while HPE Data Fabric unifies these streams into a hybrid data platform across regions. Machine learning models continuously analyze disruptions, simulate scenarios, and trigger autonomous decisions. Finally, insights flow to dashboards, applications, and model registries, enabling planners to visualize, optimize, and orchestrate supply chains in real time — all powered by HPE’s distributed cloud infrastructure.",
        mediaType: 'image',
        mediaSource: 'DataFlow.png',
        mediaLabel: 'DataFlow architecture visual'
      },
      Functional: {
        narrationText: "UniFleet operates as an intelligent AI agent built on HPE’s enterprise AI infrastructure. At the top, questions from users and operational data from ERP, TMS, telematics, and IoT systems enter through adapters, APIs, event streams, and enterprise connectors. These inputs are unified through HPE Data Fabric, creating a hybrid data layer that organizes files, objects, and streaming data across the enterprise. At the core, the UniFleet AI Agent executes a Retrieve–Reason–Respond workflow using an AI model chain orchestrated by LLM orchestration, APIs, and RAG pipelines. When actions are required, the agent calls enterprise tools, functions, and cloud APIs. All of this runs on HPE Private Cloud AI powered by NVIDIA accelerated GPUs, delivered through HPE GreenLake with built-in logging, security, and compliance — enabling UniFleet to autonomously analyze, plan, and optimize logistics operations in real time.",
        mediaType: 'image',
        mediaSource: 'Functional.png',
        mediaLabel: 'Functional architecture visual'
      },
      FrameWorks: {
        narrationText: "UniFleet is built as an enterprise AI agent on top of HPE’s AI infrastructure and an open ecosystem of AI frameworks. At its core, the UniFleet AI Agent orchestrates data intelligence through retrieval, reasoning, and action layers. The foundational platform is powered by HPE GreenLake and HPE Data Fabric, providing a unified hybrid data environment for governance, security, and monitoring. On the compute layer, HPE Private Cloud AI integrates NVIDIA DGX accelerated infrastructure to support large-scale model training, fine-tuning, and inference. Around this core, UniFleet leverages leading AI frameworks including TensorFlow, PyTorch, and Meta AI models, along with orchestration tools like Kafka, Airflow, and Databricks. Enterprise analytics platforms such as Snowflake, Elastic, Power BI, and Tableau deliver insights. Together, this HPE-anchored ecosystem enables UniFleet to operate as a scalable, enterprise-grade autonomous supply chain intelligence platform.",
        mediaType: 'image',
        mediaSource: 'FrameWorks.png',
        mediaLabel: 'Frameworks ecosystem visual'
      },
      Hardware: {
        narrationText: "UniFleet runs on a high-performance AI infrastructure built in partnership with HPE. At the core are HPE ProLiant compute servers and HPE Apollo 6500 systems that power the UniFleet AI Agent. These systems are integrated with HPE Private Cloud AI and accelerated by NVIDIA A100 and H100 GPUs, enabling large-scale model training, simulation, and real-time inference. Data is stored and processed through HPE Alletra NVMe petascale storage, ensuring high-throughput access for massive logistics datasets. The entire platform operates within HPE GreenLake, which provides unified hybrid infrastructure management, security, and orchestration. High-speed Aruba networking, WAN fiber systems, and edge devices connect fleets, IoT sensors, and operational systems to the platform. Together, this HPE-led hardware ecosystem provides the compute power, storage performance, and network resilience required for UniFleet’s autonomous supply chain intelligence.",
        mediaType: 'image',
        mediaSource: 'Hardware.png',
        mediaLabel: 'Hardware infrastructure visual'
      }
    };

    const selectedView = new URLSearchParams(window.location.search).get('view');
    const currentView = viewConfig[selectedView] || viewConfig.default;
    const narrationText = currentView.narrationText;
    const narrationGreetingText = "Hello Everyone, Welcome.";
    const narrationSpeechText = `${narrationGreetingText} ${narrationText}`.replace(/\bHPE\b/g, 'H P E');

    const narrationEl = document.getElementById('narration');
    const btnReplay = document.getElementById('btnReplay');
    const btnMute = document.getElementById('btnMute');
    const btnBackToNetwork = document.getElementById('btnBackToNetwork');

    let muted = false;
    let narrationVisual = null;
    let narrationContent = null;
    let narrationLayout = null;

    function measureNarrationMaxHeight(){
      const probe = document.createElement('div');
      probe.style.visibility = 'hidden';
      probe.style.position = 'absolute';
      probe.style.inset = '0 auto auto 0';
      probe.style.width = `${narrationEl.clientWidth || narrationEl.offsetWidth}px`;
      probe.style.lineHeight = '1.45';
      probe.style.fontSize = '18px';
      probe.style.whiteSpace = 'normal';
      probe.style.pointerEvents = 'none';
      probe.textContent = narrationText;
      narrationEl.appendChild(probe);
      const measured = Math.max(138, Math.ceil(probe.scrollHeight + 32));
      const viewportCap = Math.floor(window.innerHeight * 0.42);
      const maxHeight = Math.max(138, Math.min(measured, viewportCap));
      probe.remove();
      narrationEl.style.setProperty('--narration-max-height', `${maxHeight}px`);
    }

    function showNarrationVisual(){
      if (!narrationVisual){
        if (currentView.mediaType === 'image'){
          narrationVisual = document.createElement('img');
          narrationVisual.className = 'narration-video';
          narrationVisual.alt = currentView.mediaLabel;
          narrationVisual.src = currentView.mediaSource;
          narrationVisual.loading = 'eager';
          narrationVisual.decoding = 'async';
        } else {
          narrationVisual = document.createElement('video');
          narrationVisual.className = 'narration-video';
          narrationVisual.src = currentView.mediaSource;
          narrationVisual.autoplay = true;
          narrationVisual.muted = true;
          narrationVisual.loop = true;
          narrationVisual.preload = 'auto';
          narrationVisual.playsInline = true;
          narrationVisual.setAttribute('webkit-playsinline', 'true');
          narrationVisual.controls = false;
          narrationVisual.setAttribute('aria-label', currentView.mediaLabel);
        }
      }
      if (!narrationContent){
        narrationContent = document.createElement('div');
        narrationContent.className = 'narration-content';
        narrationContent.textContent = narrationText;
      }
      if (!narrationLayout){
        narrationLayout = document.createElement('div');
        narrationLayout.className = 'narration-layout';
      }
      narrationLayout.replaceChildren(narrationVisual, narrationContent);
      narrationEl.replaceChildren(narrationLayout);
      if (narrationVisual instanceof HTMLVideoElement){
        narrationVisual.currentTime = 0;
        narrationVisual.load();
        narrationVisual.play().catch(() => {
          narrationVisual.addEventListener('canplay', () => {
            narrationVisual.play().catch(() => {});
          }, { once:true });
        });
      }
    }

    function updateActiveButtons(){
      const navButtons = [
        ['DataFlow', document.getElementById('btnDataFlow')],
        ['Functional', document.getElementById('btnFunctional')],
        ['FrameWorks', document.getElementById('btnFrameWorks')],
        ['Hardware', document.getElementById('btnHardware')]
      ];
      navButtons.forEach(([name, el]) => {
        if (!el) return;
        if (selectedView === name){
          el.classList.add('secondary');
          el.setAttribute('aria-current', 'page');
        } else {
          el.classList.remove('secondary');
          el.removeAttribute('aria-current');
        }
      });
    }

    function speakNarration(){
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      if (muted) return;
      const utter = new SpeechSynthesisUtterance(narrationSpeechText);
      utter.rate = 0.95;
      utter.pitch = 1;
      utter.lang = 'en-US';
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v => /en-US|English/i.test(v.lang));
      if (preferred) utter.voice = preferred;
      window.speechSynthesis.speak(utter);
    }

    function replay(){
      showNarrationVisual();
      speakNarration();
    }

    btnReplay.addEventListener('click', replay);
    btnMute.addEventListener('click', () => {
      muted = !muted;
      btnMute.textContent = muted ? '🔈 Unmute' : '🔇 Mute';
      if (muted) window.speechSynthesis?.cancel();
      else speakNarration();
    });
    btnBackToNetwork.addEventListener('click', () => {
      window.speechSynthesis?.cancel();
      narrationVisual?.pause?.();
    });
    window.addEventListener('pagehide', () => {
      window.speechSynthesis?.cancel();
      narrationVisual?.pause?.();
    });

    function addNetworkVisuals(){
      const net = document.getElementById('network');
      const nodes = [
        [15,18],[31,32],[43,20],[58,40],[72,23],[84,42],[24,62],[46,66],[68,58]
      ];
      nodes.forEach(([x,y],idx)=>{
        const d = document.createElement('div');
        d.className = 'node';
        d.style.left = `${x}%`;
        d.style.top = `${y}%`;
        d.style.animationDelay = `${idx*.2}s`;
        net.appendChild(d);
      });

      const links = [
        [[15,18],[31,32]],[[31,32],[43,20]],[[43,20],[58,40]],[[58,40],[72,23]],
        [[72,23],[84,42]],[[24,62],[46,66]],[[46,66],[68,58]],[[31,32],[46,66]],[[43,20],[68,58]]
      ];

      links.forEach(([[x1,y1],[x2,y2]], i)=>{
        const line = document.createElement('div');
        line.className = 'line';
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.hypot(dx,dy);
        const angle = Math.atan2(dy,dx) * 180/Math.PI;
        line.style.width = `${len}%`;
        line.style.left = `${x1}%`;
        line.style.top = `${y1}%`;
        line.style.transform = `rotate(${angle}deg)`;
        line.style.animationDelay = `${i * .25}s`;

        const packet = document.createElement('div');
        packet.className = 'packet';
        packet.style.left = '0';
        packet.style.top = '-4px';
        packet.style.animationDelay = `${i * .35}s`;
        line.appendChild(packet);

        net.appendChild(line);
      });
    }

    addNetworkVisuals();
    updateActiveButtons();
    measureNarrationMaxHeight();
    window.addEventListener('resize', measureNarrationMaxHeight);
    setTimeout(replay, 450);
  </script>
</body>
</html>
